<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Halaman utama</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      form {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      input {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #4caf50;
        color: white;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <form onsubmit="simpanNama(event)">
      <label>Masukkan Namamu</label>
      <input type="text" id="username" required />
      <button type="submit">Masuk</button>
    </form>

    <script>
      function simpanNama(e) {
        e.preventDefault(); // biar gak reload default

        const nama = document.getElementById('username').value;

        // simpan ke localStorage
        localStorage.setItem('namaUser', nama);
        if (localStorage.getItem("namaUser")) {
  window.location.href = "index.html";
}

        // pindah ke index
        window.location.href = 'index.html';
      }
    </script>
  </body>
</html>
